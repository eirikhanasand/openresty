server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name git.hanasand.com;
    ssl_certificate /etc/letsencrypt/live/hanasand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hanasand.com/privkey.pem;

    include snippets/errors.conf;

    location = / {
        return 302 /explore/repos;
    }

    location / {
        client_max_body_size 100M;
        log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;
        proxy_pass http://localhost:8000;
        include snippets/proxy-headers.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name idk.hanasand.com;
    ssl_certificate /etc/letsencrypt/live/hanasand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hanasand.com/privkey.pem;

    include snippets/errors.conf;

    location / {
        log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 64k;
        proxy_pass http://localhost:8600;
    }
}

