server {
    listen 80;
    listen [::]:80;

    server_name hanasand.com *.hanasand.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hanasand.com www.hanasand.com;
    ssl_certificate /etc/letsencrypt/live/hanasand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hanasand.com/privkey.pem;

    include snippets/errors.conf;

    location /api/app {
        log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;
        proxy_pass http://localhost:8080;
        include snippets/proxy-headers.conf;
    }

    location / {
        log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;
        proxy_pass http://localhost:3000;
        include snippets/proxy-headers.conf;
    }
}

