<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Request Error</title>
        <style>
            :root {
                --bg: #10110f;
                --panel: #1d1e1b;
                --panel-strong: #262724;
                --panel-soft: #171815;
                --line: rgba(255, 255, 255, 0.09);
                --line-hot: rgba(255, 130, 48, 0.22);
                --text-main: #f4f1eb;
                --text-muted: #9c9990;
                --text-faint: #6f6c65;
                --accent: #ff7f32;
                --accent-soft: rgba(255, 127, 50, 0.055);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                background:
                    linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                    linear-gradient(180deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                    var(--bg);
                background-size: 72px 72px;
                color: var(--text-main);
                font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 30px;
            }

            .container {
                position: relative;
                background: linear-gradient(180deg, var(--panel-strong), var(--panel));
                border: 1px solid var(--line);
                border-radius: 24px;
                box-shadow:
                    0 24px 80px rgba(0, 0, 0, 0.42),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
                padding: 30px;
                width: 530px;
                max-width: calc(100vw - 32px);
                animation: fadeIn 0.45s ease-out;
                overflow: hidden;
            }

            .container::before {
                content: "";
                position: absolute;
                inset: 0;
                border-top: 1px solid rgba(255, 127, 50, 0.55);
                opacity: 0.75;
                pointer-events: none;
            }

            .eyebrow {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                margin-bottom: 26px;
                border: 1px solid var(--line);
                border-radius: 999px;
                background: var(--panel-soft);
                color: #b8b5ae;
                font-size: 0.72rem;
                font-weight: 650;
                letter-spacing: 0.18em;
                padding: 8px 12px;
                text-transform: uppercase;
            }

            .eyebrow::before {
                content: "";
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--accent);
            }

            .status-row {
                display: grid;
                grid-template-columns: 92px 1fr;
                gap: 26px;
                align-items: start;
            }

            h1 {
                align-items: center;
                background: rgba(255, 255, 255, 0.035);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 19px;
                color: var(--text-main);
                display: flex;
                font-family: ui-monospace, "SF Mono", Menlo, monospace;
                font-size: clamp(1.75rem, 8vw, 2.55rem);
                font-weight: 600;
                justify-content: center;
                letter-spacing: -0.045em;
                line-height: 1;
                min-height: 92px;
            }

            h2 {
                color: var(--text-main);
                font-family: Georgia, "Times New Roman", ui-serif, serif;
                font-size: clamp(1.8rem, 5vw, 2.45rem);
                font-weight: 500;
                letter-spacing: -0.025em;
                line-height: 1.02;
                margin: 1px 0 14px;
            }

            p {
                color: var(--text-muted);
                font-size: 0.94rem;
                font-weight: 500;
                line-height: 1.5;
                margin: 0 0 22px;
                max-width: 330px;
            }

            a {
                align-items: center;
                border: 1px solid transparent;
                border-radius: 14px;
                display: inline-block;
                font-size: 0.9rem;
                font-weight: 650;
                justify-content: center;
                min-width: 122px;
                padding: 0.78rem 1.04rem;
                background: rgba(255, 255, 255, 0.07);
                border-color: rgba(255, 255, 255, 0.1);
                color: #f2efe9;
                text-decoration: none;
                transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
            }

            .actions {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .secondary {
                background: transparent;
                border-color: var(--line);
                color: var(--text-muted);
            }

            a:hover {
                background: rgba(255, 255, 255, 0.11);
                border-color: rgba(255, 255, 255, 0.18);
                transform: translateY(-1px);
            }

            .secondary:hover {
                background: #30312d;
                border-color: rgba(255, 255, 255, 0.16);
            }

            #retry-message {
                color: var(--text-faint);
                font-size: 0.84rem;
                font-weight: 500;
                margin-bottom: 16px;
            }

            footer {
                position: absolute;
                bottom: 18px;
                width: 100%;
                text-align: center;
                color: var(--text-faint);
                font-size: 0.74rem;
                font-weight: 600;
                left: 0;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(12px) scale(0.98); }
                to { opacity: 1; transform: translateY(0); }
            }

            @media (max-width: 620px) {
                .container {
                    padding: 26px;
                }

                .status-row {
                    grid-template-columns: 1fr;
                    gap: 22px;
                }

                h1 {
                    min-height: 92px;
                }

                a {
                    flex: 1 1 140px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="eyebrow">Hanasand System Notice</div>
            <div class="status-row">
                <h1 id="status-code">500</h1>
                <div>
                    <h2 id="status-title">Internal Server Error</h2>
                    <p id="status-message">The site could not be reached. Please try again.</p>
                    <p id="retry-message"></p>
                    <div class="actions">
                        <a id="retry-link" href="#">Try Again</a>
                        <a class="secondary" id="home-link" href="#">Go Home</a>
                    </div>
                </div>
            </div>
        </div>

        <footer>&copy; <span id="year"></span> <span id="domain"></span></footer>

        <script>
            const errors = {
                400: ['Bad Request', 'The request could not be understood by this server.'],
                401: ['Unauthorized', 'This page requires authorization before it can be viewed.'],
                403: ['Forbidden', 'You do not have access to this page.'],
                404: ['Page Not Found', 'The page you are looking for does not exist on {domain}.'],
                405: ['Method Not Allowed', 'This request method is not allowed here.'],
                406: ['Not Acceptable', 'The requested response format is not available.'],
                408: ['Request Timeout', 'The server timed out waiting for the request.'],
                409: ['Conflict', 'The request conflicts with the current state of this resource.'],
                410: ['Gone', 'This resource is no longer available.'],
                418: ["I'm a teapot", 'This endpoint refuses to brew coffee.'],
                429: ['Too Many Requests', 'Slow down and try again in a moment.'],
                451: ['Unavailable for Legal Reasons', 'This resource is unavailable for legal reasons.'],
                500: ['Internal Server Error', 'The site could not be reached. Please try again.'],
                501: ['Not Implemented', 'This feature is not implemented on this server.'],
                502: ['Bad Gateway', 'The upstream service returned an invalid response.'],
                503: ['Service Unavailable', 'The service is temporarily unavailable. Please try again soon.'],
                504: ['Gateway Timeout', 'The upstream service took too long to respond.'],
            };
            const rendered = {
                code: Number('{{code}}'),
                title: '{{title}}',
                message: '{{message}}',
                domain: '{{domain}}',
                homeUrl: '{{home_url}}',
                retryable: '{{retryable}}' === 'true',
            };
            const maxRetries = 5;
            const retryBaseSeconds = 5;
            const params = new URLSearchParams(window.location.search);
            const renderedStatus = Number.isFinite(rendered.code);
            const fallbackCode = Number(params.get('code')) || 500;
            const code = renderedStatus ? rendered.code : fallbackCode;
            const [fallbackTitle, fallbackMessage] = errors[code] || errors[500];
            const fullHostname = window.location.hostname || 'hanasand.com';
            const parts = fullHostname.split('.');
            const fallbackDomain = parts.length >= 2 ? parts.slice(-2).join('.') : fullHostname;
            const domain = renderedStatus ? rendered.domain : fallbackDomain;
            const title = renderedStatus ? rendered.title : fallbackTitle;
            const message = renderedStatus ? rendered.message : fallbackMessage.replace('{domain}', domain);
            const retryable = renderedStatus ? rendered.retryable : [408, 429, 500, 502, 503, 504].includes(code);
            const retries = Math.min(Number(params.get('retries')) || 0, maxRetries);
            const homeLink = document.getElementById('home-link');
            const retryLink = document.getElementById('retry-link');
            const retryMessage = document.getElementById('retry-message');
            const retryUrl = new URL(window.location.href);

            document.title = `${code} - ${title}`;
            document.getElementById('status-code').textContent = String(code);
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-message').textContent = message;
            document.getElementById('domain').textContent = domain;
            homeLink.href = renderedStatus ? rendered.homeUrl : `https://${domain}`;
            retryUrl.searchParams.set('retries', String(retries + 1));
            retryLink.href = retryUrl.toString();
            document.getElementById('year').textContent = new Date().getFullYear();

            if (retryable && retries < maxRetries) {
                const delaySeconds = retryBaseSeconds * Math.pow(2, retries);
                retryMessage.textContent = `Retrying in ${delaySeconds}s. Attempt ${retries + 1} of ${maxRetries}.`;
                window.setTimeout(() => window.location.assign(retryLink.href), delaySeconds * 1000);
            } else if (retryable) {
                retryMessage.textContent = 'Automatic retries stopped. Try again manually when you are ready.';
            } else {
                retryMessage.remove();
            }
        </script>
    </body>
</html>
