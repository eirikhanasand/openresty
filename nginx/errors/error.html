<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Request Error</title>
        <style>
            :root {
                --bg-dark: #000000;
                --glass-bg: rgba(255, 255, 255, 0.08);
                --text-main: #f5f5f7;
                --accent: #0a84ff;
                --blur: 20px;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                height: 100vh;
                background: radial-gradient(circle at top, #0a0a0a, #000);
                color: var(--text-main);
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .container {
                backdrop-filter: blur(var(--blur)) saturate(180%);
                -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
                background-color: var(--glass-bg);
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.15);
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
                padding: 60px 80px;
                text-align: center;
                width: 500px;
                max-width: calc(100vw - 32px);
                animation: fadeIn 0.8s ease-out;
            }

            h1 {
                font-size: 6rem;
                color: var(--accent);
                letter-spacing: -2px;
                margin-bottom: 0.5rem;
                text-shadow: 0 0 20px rgba(10, 132, 255, 0.5);
            }

            h2 {
                font-size: 1.4rem;
                margin-bottom: 1.5rem;
                color: #d1d1d6;
            }

            p {
                font-size: 1rem;
                color: #a1a1aa;
                margin: 0 auto 1.8rem auto;
                max-width: 320px;
            }

            a {
                display: inline-block;
                padding: 0.6rem 1.4rem;
                font-size: 1rem;
                color: var(--text-main);
                background: var(--accent);
                border-radius: 12px;
                text-decoration: none;
                transition: all 0.25s ease;
                box-shadow: 0 4px 20px rgba(10, 132, 255, 0.3);
            }

            .actions {
                display: flex;
                justify-content: center;
                gap: 0.8rem;
                flex-wrap: wrap;
            }

            .secondary {
                background: rgba(255, 255, 255, 0.08);
                box-shadow: none;
            }

            a:hover {
                background: #0071e3;
                box-shadow: 0 6px 25px rgba(10, 132, 255, 0.5);
                transform: translateY(-2px);
            }

            footer {
                position: absolute;
                bottom: 15px;
                width: 100%;
                text-align: center;
                color: #555;
                font-size: 0.8rem;
                letter-spacing: 0.3px;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 id="status-code">500</h1>
            <h2 id="status-title">Internal Server Error</h2>
            <p id="status-message">The site could not be reached. Please try again.</p>
            <p id="retry-message"></p>
            <div class="actions">
                <a id="retry-link" href="#">Try Again</a>
                <a class="secondary" id="home-link" href="#">Go Home</a>
            </div>
        </div>

        <footer>&copy; <span id="year"></span> <span id="domain"></span></footer>

        <script>
            const errors = {
                400: ['Bad Request', 'The request could not be understood by this server.'],
                401: ['Unauthorized', 'This page requires authorization before it can be viewed.'],
                403: ['Forbidden', 'You do not have access to this page.'],
                404: ['Page Not Found', 'The page you are looking for does not exist on {domain}.'],
                405: ['Method Not Allowed', 'This request method is not allowed here.'],
                406: ['Not Acceptable', 'The requested response format is not available.'],
                408: ['Request Timeout', 'The server timed out waiting for the request.'],
                409: ['Conflict', 'The request conflicts with the current state of this resource.'],
                410: ['Gone', 'This resource is no longer available.'],
                418: ["I'm a teapot", 'This endpoint refuses to brew coffee.'],
                429: ['Too Many Requests', 'Slow down and try again in a moment.'],
                451: ['Unavailable for Legal Reasons', 'This resource is unavailable for legal reasons.'],
                500: ['Internal Server Error', 'The site could not be reached. Please try again.'],
                501: ['Not Implemented', 'This feature is not implemented on this server.'],
                502: ['Bad Gateway', 'The upstream service returned an invalid response.'],
                503: ['Service Unavailable', 'The service is temporarily unavailable. Please try again soon.'],
                504: ['Gateway Timeout', 'The upstream service took too long to respond.'],
            };
            const rendered = {
                code: Number('{{code}}'),
                title: '{{title}}',
                message: '{{message}}',
                domain: '{{domain}}',
                homeUrl: '{{home_url}}',
                retryable: '{{retryable}}' === 'true',
            };
            const maxRetries = 5;
            const retryBaseSeconds = 5;
            const params = new URLSearchParams(window.location.search);
            const renderedStatus = Number.isFinite(rendered.code);
            const fallbackCode = Number(params.get('code')) || 500;
            const code = renderedStatus ? rendered.code : fallbackCode;
            const [fallbackTitle, fallbackMessage] = errors[code] || errors[500];
            const fullHostname = window.location.hostname || 'hanasand.com';
            const parts = fullHostname.split('.');
            const fallbackDomain = parts.length >= 2 ? parts.slice(-2).join('.') : fullHostname;
            const domain = renderedStatus ? rendered.domain : fallbackDomain;
            const title = renderedStatus ? rendered.title : fallbackTitle;
            const message = renderedStatus ? rendered.message : fallbackMessage.replace('{domain}', domain);
            const retryable = renderedStatus ? rendered.retryable : [408, 429, 500, 502, 503, 504].includes(code);
            const retries = Math.min(Number(params.get('retries')) || 0, maxRetries);
            const homeLink = document.getElementById('home-link');
            const retryLink = document.getElementById('retry-link');
            const retryMessage = document.getElementById('retry-message');
            const retryUrl = new URL(window.location.href);

            document.title = `${code} - ${title}`;
            document.getElementById('status-code').textContent = String(code);
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-message').textContent = message;
            document.getElementById('domain').textContent = domain;
            homeLink.href = renderedStatus ? rendered.homeUrl : `https://${domain}`;
            retryUrl.searchParams.set('retries', String(retries + 1));
            retryLink.href = retryUrl.toString();
            document.getElementById('year').textContent = new Date().getFullYear();

            if (retryable && retries < maxRetries) {
                const delaySeconds = retryBaseSeconds * Math.pow(2, retries);
                retryMessage.textContent = `Retrying in ${delaySeconds}s. Attempt ${retries + 1} of ${maxRetries}.`;
                window.setTimeout(() => window.location.assign(retryLink.href), delaySeconds * 1000);
            } else if (retryable) {
                retryMessage.textContent = 'Automatic retries stopped. Try again manually when you are ready.';
            } else {
                retryMessage.remove();
            }
        </script>
    </body>
</html>
